# IMPORTANT: Do NOT commit real values to source control.
# Use a secrets manager (AWS Secrets Manager, HashiCorp Vault, Sealed Secrets)
# to inject values at deploy time. This file is a template only.
#
# To create manually (base64 encode values first):
#   echo -n "mongodb://user:pass@host:27017/mcp" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: mcp-secrets
  namespace: mcp
  labels:
    app: mcp
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Base64-encoded values — replace before applying
  DB_URI: <BASE64_ENCODED_MONGODB_URI>
  CORS_ORIGINS: <BASE64_ENCODED_CORS_ORIGINS>
