apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-deployment
  namespace: mcp
  labels:
    app: mcp
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  # Zero-downtime rolling updates
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
        app.kubernetes.io/name: mcp-server
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: "{{ .Values.configChecksum }}"
    spec:
      # Spread pods across availability zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: mcp

      # Graceful shutdown window must exceed SHUTDOWN_TIMEOUT_MS
      terminationGracePeriodSeconds: 30

      # Non-root security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: mcp-server
          image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<YOUR_AWS_REGION>.amazonaws.com/mcp-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Load non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: mcp-config

          # Load sensitive values from Secret
          env:
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: DB_URI
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: CORS_ORIGINS

          # Startup probe — gives app time to connect to DB on first boot
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            failureThreshold: 12
            periodSeconds: 5

          # Liveness probe — fast, no DB (just proves process is alive)
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness probe — checks DB connectivity before receiving traffic
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Hardened container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Writable tmp dir for logs when rootfs is read-only
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs

      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
