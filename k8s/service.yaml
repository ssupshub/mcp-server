apiVersion: v1
kind: Service
metadata:
  name: mcp-service
  namespace: mcp
  labels:
    app: mcp
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: backend
spec:
  # ClusterIP is safer than LoadBalancer; external access via Ingress/ALB only
  type: ClusterIP
  selector:
    app: mcp
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
